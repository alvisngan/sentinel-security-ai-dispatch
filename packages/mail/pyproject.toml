[project]
name = "mail"
version = "0.1.0"
description = "Microsoft Graph mailbox access"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27,<1.0",
    "msal>=1.31,<2.0",
    "python-dotenv>=1.0,<2.0",
]

[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mail"]
